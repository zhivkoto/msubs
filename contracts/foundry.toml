[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
evm_version = "cancun"

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 64

[rpc_endpoints]
monad_testnet = "${MONAD_TESTNET_RPC_URL}"
